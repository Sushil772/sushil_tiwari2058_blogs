{% extends 'base.html' %} {% block content %}

<!-- Bootstrap -->
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

<style>
  body {
    background: linear-gradient(135deg, #667eea, #764ba2);
  }

  .login-box {
    max-width: 400px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    transition: 0.3s ease;
  }

  .login-box:hover {
    transform: scale(1.02);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
  }

  label {
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
  }

  input:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
    outline: none;
  }

  button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .error-box {
    color: red;
    text-align: center;
    margin-top: 10px;
  }

  .extra-links {
    text-align: center;
    margin-top: 15px;
  }

  .extra-links a {
    display: block;
    margin-top: 5px;
    text-decoration: none;
  }

  .extra-links a:hover {
    text-decoration: underline;
  }
</style>

<div class="login-box">
  <h1>Login</h1>

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label>Username</label><br />
      {{ form.username }}
    </div>

    <div class="mb-3">
      <label>Password</label><br />
      {{ form.password }}
    </div>

    <button type="submit" class="btn btn-primary">Login</button>

    <div class="extra-links">
      <a href="{% url 'password_reset' %}">Forgot Password?</a>
      <a href="/register/">Don't have an account? Register</a>
    </div>
  </form>

  {% if form.errors %}
  <p class="error-box">Invalid username or password</p>
  {% endif %}
</div>

<!-- JavaScript animation -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const box = document.querySelector(".login-box");
    box.style.opacity = "0";
    box.style.transform = "translateY(30px)";

    setTimeout(() => {
      box.style.transition = "0.6s ease";
      box.style.opacity = "1";
      box.style.transform = "translateY(0)";
    }, 100);
  });
</script>

{% endblock %}
